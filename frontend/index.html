<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitTrack — Frontend à venir</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        h1 { font-size: 3rem; font-weight: 800; margin-bottom: 0.5rem; }
        h1 span { color: #e94560; }
        p { font-size: 1.2rem; color: #aaa; margin-bottom: 2rem; }
        .badge {
            display: inline-block;
            background: #e94560;
            color: #fff;
            padding: 0.5rem 1.5rem;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .api-link {
            margin-top: 2rem;
            color: #4ecca3;
            font-size: 0.95rem;
        }
        .api-link a { color: #4ecca3; text-decoration: none; border-bottom: 1px solid #4ecca3; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Fit<span>Track</span></h1>
        <p>Frontend React — Session 2</p>
        <div class="badge">Coming Soon</div>
        <div class="api-link">
            <p>API disponible sur <a href="http://localhost:5000/api" target="_blank">localhost:5000/api</a></p>
        </div>
    </div>
</body>
</html>
